services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: jobqueue
      POSTGRES_PASSWORD: jobqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  worker-service:
    build:
      context: .
      args:
        SERVICE: worker-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jobqueue
      DB_USER: jobqueue
      DB_PASSWORD: jobqueue
    depends_on:
      - postgres

  api-service:
    build:
      context: .
      args:
        SERVICE: api-service
    ports:
      - "8080:8080"
    environment:
      WORKER_BASE_URL: http://worker-service:8081
    depends_on:
      - worker-service

volumes:
  postgres-data:
